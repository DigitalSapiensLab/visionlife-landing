services:
  visionlife-landing:
    build:
      context: .
      dockerfile: Dockerfile
    image: visionlife-landing:latest
    container_name: visionlife-landing
    restart: unless-stopped
    # La imagen ya incluye Nginx + el backend CAPI (Node). Las variables de la
    # Conversions API se definen en Dokploy → Environment (o en un .env local).
    # El token es secreto: NUNCA lo subas al repo.
    environment:
      - CAPI_ENABLED=${CAPI_ENABLED:-false}
      - CAPI_ACCESS_TOKEN=${CAPI_ACCESS_TOKEN:-}
      - CAPI_PIXEL_ID=${CAPI_PIXEL_ID:-}
      - CAPI_TEST_EVENT_CODE=${CAPI_TEST_EVENT_CODE:-}
      - CAPI_ALLOWED_ORIGIN=${CAPI_ALLOWED_ORIGIN:-}
      - CAPI_API_VERSION=${CAPI_API_VERSION:-v21.0}
    ports:
      # host:container — cambia 8080 si el puerto está ocupado en tu VPS.
      # En Dokploy con dominio/Traefik puedes quitar este mapeo y exponer solo el 80.
      - "8080:80"
    volumes:
      # Config guardada desde el panel (meta-config.js + archivos de verificación).
      # PERSISTE entre redeploys. En Dokploy: añade un Volume Mount → ruta /data.
      - vl_data:/data

volumes:
  vl_data:
