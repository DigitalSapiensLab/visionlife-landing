server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compresión
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Cabeceras de seguridad base. OJO: nginx NO hereda add_header en bloques
    # location que definan sus propios add_header, así que se repiten abajo.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ===== Conversions API (backend Node en el MISMO contenedor) =====
    # Redirige /api/ al proceso Node que escucha en 127.0.0.1:3000 (lo arranca
    # start.sh). Si Node no está, nginx sigue sirviendo la web y /api/ da 502.
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 3s;
        proxy_read_timeout 10s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # La configuración del Pixel debe llegar siempre fresca: NO cachear.
    # (El bloque exacto "=" gana sobre el regex de abajo.)
    location = /meta-config.js {
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "no-store" always;
    }

    # Panel de administración: nunca indexar + protegido con usuario/contraseña.
    location = /admin.html {
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
        # Usuario/contraseña (hash en .htpasswd, copiado por el Dockerfile).
        # Para cambiar la clave:  htpasswd -B .htpasswd admin   → commit → Deploy.
        auth_basic "VisionLife Admin";
        auth_basic_user_file /etc/nginx/.htpasswd;
    }

    # Caché de estáticos
    location ~* \.(?:avif|webp|png|jpe?g|gif|svg|ico|css|js|woff2?)$ {
        expires 7d;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "public, max-age=604800, immutable";
        access_log off;
    }
}
