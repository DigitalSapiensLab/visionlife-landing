    :root{

      --wa-green-dark:#1ebe5d;

    *{ box-sizing:border-box; margin:0; padding:0; }

    html{ scroll-behavior:smooth; }

    body{
      background:

      color:#e8eef2;

      -webkit-font-smoothing:antialiased;
      min-height:100vh;
    }

    /* ===== Header sticky ===== */
    .site-header{
      position:sticky;
      top:0;
      z-index:50;
      height:var(--header-h);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 16px;
      background:rgba(5,7,12,.82);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(1,216,160,.18);
    }
    .brand{ display:flex; align-items:center; gap:10px; }
    .brand img{
      height:48px;
      width:auto;
      display:block;
    }
    .header-cta{
      display:inline-flex;
      align-items:center;
      gap:8px;
      background:var(--wa-green);
      color:#04210f;
      font-weight:700;
      font-size:14px;
      text-decoration:none;
      padding:9px 14px;
      border-radius:999px;
      transition:transform .15s ease, background .15s ease;
      white-space:nowrap;
    }
    .header-cta:hover{ background:var(--wa-green-dark); transform:translateY(-1px); }
    .header-cta svg{ width:18px; height:18px; }
    .header-cta .label-long{ display:none; }

    /* ===== Feed de imágenes ===== */
    .feed{
      display:flex;
      flex-direction:column;
      align-items:center;
      width:100%;
    }
    .feed a{
      display:block;
      width:100%;
      line-height:0;
      position:relative;
      transition:filter .2s ease;
    }
    .feed a:hover{ filter:brightness(1.04); }
    .feed img{
      width:100%;
      height:auto;
      display:block;
    }

    /* Móvil: ancho completo (por defecto). Escritorio: 30% del ancho del navegador */
    @media (min-width:1024px){
      .feed{
        width:30vw;
        margin-inline:auto;
      }
      .brand img{ height:56px; }
      .header-cta .label-long{ display:inline; }
    }

    /* ===== Botón flotante de WhatsApp ===== */
    .wa-fab{
      position:fixed;
      right:18px;
      bottom:18px;
      z-index:60;
      width:58px;
      height:58px;
      border-radius:50%;
      background:var(--wa-green);
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 8px 24px rgba(0,0,0,.45), 0 0 0 0 rgba(37,211,102,.6);
      animation:wa-pulse 2.4s infinite;
      transition:transform .15s ease;
    }
    .wa-fab:hover{ transform:scale(1.07); }
    .wa-fab svg{ width:32px; height:32px; }
    @keyframes wa-pulse{
      0%{ box-shadow:0 8px 24px rgba(0,0,0,.45), 0 0 0 0 rgba(37,211,102,.55); }
      70%{ box-shadow:0 8px 24px rgba(0,0,0,.45), 0 0 0 16px rgba(37,211,102,0); }
      100%{ box-shadow:0 8px 24px rgba(0,0,0,.45), 0 0 0 0 rgba(37,211,102,0); }
    }
    @media (prefers-reduced-motion:reduce){ .wa-fab{ animation:none; } }

    /* ===== Footer ===== */
    .site-footer{
      text-align:center;
      padding:34px 18px 110px;
      color:#7e8a93;
      font-size:13px;
      line-height:1.7;
    }
    .site-footer a{ color:var(--brand-teal); text-decoration:none; }
