    .feed img{
      width:100%;
      height:auto;
      display:block;

        margin-inline:auto;

      .header-cta .label-long{ display:inline; }

    /* ===== Slideshow automático (PASOS) ===== */
    .slideshow{
      width:100%;
      margin:2px 0;          /* margen casi imperceptible */
      padding:0 2px;         /* deja respirar el marco a los lados */
    }
    .slides{
      position:relative;
      overflow:hidden;
      line-height:0;
      border:1px solid rgba(1,216,160,.30);   /* marco muy pequeño */
      border-radius:12px;                       /* borde redondeado leve */
      background:var(--bg);
    }
    .slides-track{
      display:flex;
      will-change:transform;
      transition:transform .55s cubic-bezier(.45,.05,.2,1);
    }
    .slides-track .slide{
      flex:0 0 100%;
      width:100%;
    }
    .slides-track img{
      width:100%;
      height:auto;
      display:block;
    }
    /* barra de navegación / dots */
    .slides-dots{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:9px;
      padding:11px 0 3px;
      line-height:0;
    }

      width:8px;
      height:8px;
      padding:0;
      border:0;
      border-radius:50%;
      background:rgba(232,238,242,.26);
      cursor:pointer;
      transition:background .2s ease, transform .2s ease, width .2s ease;

    .slides-dots button:hover{ background:rgba(232,238,242,.5); }

  <script>
  (function(){
    var root = document.querySelector('[data-slideshow]');
    if(!root) return;
    var track = root.querySelector('.slides-track');
    var slides = Array.prototype.slice.call(track.children);
    var dots   = Array.prototype.slice.call(root.querySelectorAll('.slides-dots button'));
    var n = slides.length, i = 0, timer = null;
    var INTERVAL = 4200;
    var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    function show(idx){
      i = (idx % n + n) % n;
      track.style.transform = 'translateX(' + (-i * 100) + '%)';
      for(var d = 0; d < dots.length; d++){
        dots[d].setAttribute('aria-current', d === i ? 'true' : 'false');
      }
    }
    function next(){ show(i + 1); }
    function start(){ if(reduce) return; stop(); timer = setInterval(next, INTERVAL); }
    function stop(){ if(timer){ clearInterval(timer); timer = null; } }

    dots.forEach(function(dot, idx){
      dot.addEventListener('click', function(){ show(idx); start(); });
    });

    // pausa al interactuar (hover en escritorio, táctil en móvil)
    root.addEventListener('mouseenter', stop);
    root.addEventListener('mouseleave', start);
    root.addEventListener('touchstart', stop, {passive:true});
    root.addEventListener('touchend', start, {passive:true});

    // swipe táctil
    var x0 = null;
    track.addEventListener('touchstart', function(e){ x0 = e.touches[0].clientX; }, {passive:true});
    track.addEventListener('touchend', function(e){
      if(x0 === null) return;
      var dx = e.changedTouches[0].clientX - x0;
      if(Math.abs(dx) > 40){ show(i + (dx < 0 ? 1 : -1)); }
      x0 = null;
    }, {passive:true});

    // pausa cuando la pestaña no está visible
    document.addEventListener('visibilitychange', function(){
      if(document.hidden){ stop(); } else { start(); }
    });

    show(0);
    start();
  })();
  </script>

</body>
</html>
